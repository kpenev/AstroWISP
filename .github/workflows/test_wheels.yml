name: Test wheels

# Linux slice of the OS x Python x numpy matrix from numpy2_ci_plan.md,
# implemented as the plan's "split build from test" design:
#
#   * build  - one numpy-agnostic cibuildwheel run on ubuntu-latest produces
#              the cp311..cp314 wheels (4 wheels) and uploads them as an
#              artifact. AstroWISP talks to its C++ library through ctypes, not
#              the numpy C-API, so a single wheel per Python runs under numpy 1
#              *or* numpy 2 - the numpy axis lives only in the test job.
#
#   * test   - fans those wheels out to the six valid (Python, numpy) cells:
#
#                Python | numpy 1 | numpy 2
#                -------|---------|--------
#                3.11   |   yes   |   yes
#                3.12   |   yes   |   yes
#                3.13   |    -    |   yes
#                3.14   |    -    |   yes
#
#              The numpy-1 x {3.13, 3.14} cells are excluded: numpy 1.26 (the
#              last 1.x) ships no cp313/cp314 wheels.
#
# Tests run on the *host* runner, not inside cibuildwheel's manylinux2014
# container: modern scipy (a transitive AstroWISP dependency) ships cp313+
# wheels only for manylinux_2_28, which cannot install in the glibc-2.17
# manylinux2014 image (pip would fall back to building scipy from source and
# fail on the missing OpenBLAS). ubuntu-latest is new enough to install those
# wheels directly. Manual-only, like build_wheels.yml.
on: [workflow_dispatch]

jobs:
  build:
    name: Build Linux wheels (cp311-cp314)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.0.0
        env:
            # One wheel per Python; numpy is not a build dependency (ctypes).
            CIBW_BUILD: cp311-* cp312-* cp313-* cp314-*

            # Skip cibuildwheel's in-container test (configured via
            # [tool.cibuildwheel] test-command in pyproject.toml). That test
            # installs the wheel inside the manylinux2014 image, where scipy
            # has no cp313+ wheel; the test job below runs on the host instead.
            CIBW_TEST_SKIP: "*"

            # Reuse the proven manylinux2014 + CentOS-vault Boost install path
            # from build_wheels.yml (CentOS 7 repos moved to vault after EOL).
            CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
            CIBW_BEFORE_BUILD_LINUX: >
              sed -i s/mirror.centos.org/vault.centos.org/g /etc/yum.repos.d/CentOS-*.repo &&
              sed -i s/^#.*baseurl=http/baseurl=http/g /etc/yum.repos.d/CentOS-*.repo &&
              sed -i s/^mirrorlist=http/#mirrorlist=http/g /etc/yum.repos.d/CentOS-*.repo &&
              yum -y -v install boost boost-thread boost-devel

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: linux-wheels
          path: ./wheelhouse/*.whl

  test:
    name: Test py${{ matrix.python-version }} numpy${{ matrix.numpy }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        numpy: ['1', '2']
        exclude:
          # numpy 1.26 has no cp313/cp314 wheels.
          - python-version: '3.13'
            numpy: '1'
          - python-version: '3.14'
            numpy: '1'

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: linux-wheels
          path: wheelhouse

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install wheel + numpy ${{ matrix.numpy }} and run the test suite
        run: |
          # cp313 <- '3.13', etc. - picks this cell's wheel out of the artifact.
          pytag=cp$(echo '${{ matrix.python-version }}' | tr -d .)
          python -m pip install --upgrade pip
          python -m pip install \
            "numpy${{ matrix.numpy == '1' && '<2' || '>=2' }}" \
            asteval pandas wheelhouse/*${pytag}*.whl
          python -c "import numpy; print('numpy', numpy.__version__)"
          # Mirror the [tool.cibuildwheel] test-command in pyproject.toml.
          # pytest --pyargs astrowisp.tests is NOT equivalent: it collects only
          # files matching test_*.py, so it silently skips the fit-star-shape
          # tests, which live in test_fit_star_shape/noiseless_tests.py.
          python -m astrowisp.tests.test_fake_image
          python -m astrowisp.tests.test_piecewise_bicubic_psf
          python -m astrowisp.tests.test_background
          python -m astrowisp.tests.test_fit_star_shape.noiseless_tests
          python -m astrowisp.tests.test_fistar
