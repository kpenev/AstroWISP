name: Test wheels

# Build an AstroWISP wheel, then install it on the runner host and run the
# installed test suite against numpy 2. Starts with a single cell
# (ubuntu-latest, Python 3.13, numpy 2) as the first step toward the full
# OS x Python x numpy matrix described in numpy2_ci_plan.md. Manual-only,
# like build_wheels.yml.
#
# The test runs on the *host* runner, not inside cibuildwheel's manylinux2014
# container: modern scipy (a transitive AstroWISP dependency) ships cp313
# wheels only for manylinux_2_28, which cannot install in the glibc-2.17
# manylinux2014 image (pip would fall back to building scipy from source and
# fail on the missing OpenBLAS). ubuntu-latest is new enough to install those
# wheels directly. This is the "split build from test" design of the plan.
on: [workflow_dispatch]

jobs:
  build_and_test:
    name: Build & test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.0.0
        env:
            # cp313 only, for this first cell.
            CIBW_BUILD: cp313-*

            # Skip cibuildwheel's in-container test (configured via
            # [tool.cibuildwheel] test-command in pyproject.toml). That test
            # installs the wheel inside the manylinux2014 image, where scipy
            # has no cp313 wheel; we test on the host instead (steps below).
            CIBW_TEST_SKIP: "*"

            # Reuse the proven manylinux2014 + CentOS-vault Boost install path
            # from build_wheels.yml (CentOS 7 repos moved to vault after EOL).
            CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
            CIBW_BEFORE_BUILD_LINUX: >
              sed -i s/mirror.centos.org/vault.centos.org/g /etc/yum.repos.d/CentOS-*.repo &&
              sed -i s/^#.*baseurl=http/baseurl=http/g /etc/yum.repos.d/CentOS-*.repo &&
              sed -i s/^mirrorlist=http/#mirrorlist=http/g /etc/yum.repos.d/CentOS-*.repo &&
              yum -y -v install boost boost-thread boost-devel

            # No CIBW_TEST_*: testing happens on the host (see steps below) so
            # transitive-dependency wheels (scipy) resolve against the runner's
            # newer glibc instead of the manylinux2014 container.

      - name: Set up Python 3.13 for testing
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install wheel + numpy 2 and run the test suite
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy>=2" asteval pandas wheelhouse/*.whl
          python -c "import numpy; print('numpy', numpy.__version__)"
          # Mirror the [tool.cibuildwheel] test-command in pyproject.toml.
          # pytest --pyargs astrowisp.tests is NOT equivalent: it collects only
          # files matching test_*.py, so it silently skips the fit-star-shape
          # tests, which live in test_fit_star_shape/noiseless_tests.py.
          python -m astrowisp.tests.test_fake_image
          python -m astrowisp.tests.test_piecewise_bicubic_psf
          python -m astrowisp.tests.test_background
          python -m astrowisp.tests.test_fit_star_shape.noiseless_tests
          python -m astrowisp.tests.test_fistar

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-cp313
          path: ./wheelhouse/*.whl
